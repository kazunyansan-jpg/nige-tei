<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>逃げていい</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: linear-gradient(160deg, #fdf6f0 0%, #fce8e8 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Hiragino Sans', 'Noto Sans JP', sans-serif;
    padding: 20px;
  }

  .card {
    background: #fff;
    border-radius: 24px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.10);
    padding: 36px 28px;
    width: 100%;
    max-width: 400px;
  }

  .screen { display: none; }
  .screen.active { display: block; }

  .center {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 16px;
  }

  .top-icon { font-size: 52px; margin-bottom: 4px; }

  h1.title {
    font-size: 36px;
    font-weight: 900;
    color: #2c2c2c;
    letter-spacing: 0.05em;
  }

  .subtitle { font-size: 16px; color: #555; line-height: 1.7; }

  .note {
    font-size: 14px;
    color: #888;
    line-height: 1.7;
    background: #fdf0f0;
    border-radius: 12px;
    padding: 12px 16px;
  }

  .btn-primary {
    background: #e07070;
    color: #fff;
    border: none;
    border-radius: 50px;
    padding: 14px 36px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 8px;
    letter-spacing: 0.05em;
    width: 100%;
    font-family: inherit;
  }

  .btn-primary.gray { background: #95a5a6; }

  .btn-text {
    background: none;
    border: none;
    color: #aaa;
    font-size: 13px;
    cursor: pointer;
    margin-top: 12px;
    text-decoration: underline;
    font-family: inherit;
  }

  /* CHECK */
  .progress { display: flex; gap: 8px; margin-bottom: 4px; }
  .dot { width: 10px; height: 10px; border-radius: 50%; background: #ddd; transition: background 0.3s; }
  .dot.active { background: #e07070; }
  .q-num { font-size: 13px; color: #bbb; }
  .q-text { font-size: 20px; font-weight: 700; color: #2c2c2c; line-height: 1.6; white-space: pre-line; margin: 8px 0; }
  .btn-row { display: flex; flex-direction: column; gap: 12px; width: 100%; margin-top: 8px; }

  .btn-safe {
    background: #f0f7f0; color: #2c7a2c; border: 2px solid #b2d8b2;
    border-radius: 14px; padding: 16px; font-size: 16px; font-weight: 700;
    cursor: pointer; font-family: inherit;
  }
  .btn-unsafe {
    background: #fdf0f0; color: #c0392b; border: 2px solid #f0b2b2;
    border-radius: 14px; padding: 16px; font-size: 16px; font-weight: 700;
    cursor: pointer; font-family: inherit;
  }

  /* RESULT */
  .result-icon { font-size: 52px; }
  .result-title { font-size: 24px; font-weight: 900; }
  .result-text { font-size: 15px; color: #555; line-height: 1.8; background: #fafafa; border-radius: 12px; padding: 16px; }

  /* EXCUSES */
  .excuse-page-title { font-size: 20px; font-weight: 900; color: #2c2c2c; margin-bottom: 4px; }
  .excuse-page-note { font-size: 13px; color: #888; margin-bottom: 6px; line-height: 1.6; }
  .excuse-hint {
    font-size: 12px; color: #e07070; background: #fdf0f0;
    border-radius: 8px; padding: 8px 12px; margin-bottom: 16px; line-height: 1.6;
  }

  .category-label {
    font-size: 12px; font-weight: 700; color: #aaa;
    letter-spacing: 0.08em; margin: 16px 0 8px 2px;
    text-transform: uppercase;
  }

  .excuse-btn {
    display: flex; justify-content: space-between; align-items: center;
    width: 100%; border: 1.5px solid #e0e0e0; border-radius: 12px;
    padding: 12px 14px; margin-bottom: 8px; cursor: pointer;
    background: #fff; text-align: left; gap: 8px;
    font-family: inherit; transition: all 0.2s;
  }
  .excuse-btn:hover { border-color: #e07070; background: #fff8f8; }
  .excuse-btn.selected { border-color: #e07070; background: #fff0f0; }

  .excuse-text { font-size: 14px; color: #333; line-height: 1.5; flex: 1; }
  .select-badge { font-size: 11px; color: #ccc; white-space: nowrap; flex-shrink: 0; }
  .excuse-btn.selected .select-badge { color: #e07070; }

  /* EDIT AREA */
  .edit-area {
    margin-top: 16px;
    border: 2px solid #e07070;
    border-radius: 16px;
    padding: 16px;
    background: #fffafa;
  }
  .edit-label { font-size: 13px; color: #e07070; font-weight: 700; margin-bottom: 8px; }
  .edit-hint { font-size: 12px; color: #aaa; margin-bottom: 8px; line-height: 1.5; }

  textarea {
    width: 100%; border: 1.5px solid #f0c0c0; border-radius: 10px;
    padding: 12px; font-size: 15px; font-family: inherit;
    line-height: 1.6; color: #333; resize: none;
    background: #fff; outline: none;
  }
  textarea:focus { border-color: #e07070; }

  .btn-copy {
    background: #e07070; color: #fff; border: none; border-radius: 50px;
    padding: 12px 24px; font-size: 15px; font-weight: 700;
    cursor: pointer; width: 100%; margin-top: 10px; font-family: inherit;
    transition: background 0.2s;
  }
  .btn-copy.done { background: #27ae60; }

  .help-box {
    background: #f0f4ff; border-radius: 12px;
    padding: 16px; margin: 16px 0;
  }
  .help-title { font-size: 14px; font-weight: 700; color: #3a3aaa; margin-bottom: 8px; }
  .help-item { font-size: 13px; color: #444; margin: 4px 0; line-height: 1.6; }
</style>
</head>
<body>
<div class="card">

  <!-- TOP -->
  <div id="screen-top" class="screen active">
    <div class="center">
      <div class="top-icon">🕊️</div>
      <h1 class="title">逃げていい</h1>
      <p class="subtitle">誰かと会う前に、<br>少しだけ確認してみて。</p>
      <p class="note">あなたが感じた「なんか嫌だな」は<br><strong>ぜったいに正しい。</strong></p>
      <button class="btn-primary" onclick="startCheck()">チェックを始める</button>
    </div>
  </div>

  <!-- CHECK -->
  <div id="screen-check" class="screen">
    <div class="center">
      <div class="progress" id="progress"></div>
      <p class="q-num" id="q-num"></p>
      <p class="q-text" id="q-text"></p>
      <div class="btn-row">
        <button class="btn-safe" id="btn-safe" onclick="answer(true)"></button>
        <button class="btn-unsafe" id="btn-unsafe" onclick="answer(false)"></button>
      </div>
    </div>
  </div>

  <!-- RESULT -->
  <div id="screen-result" class="screen">
    <div class="center">
      <div class="result-icon" id="result-icon"></div>
      <h2 class="result-title" id="result-title"></h2>
      <p class="result-text" id="result-text"></p>
      <button class="btn-primary" id="btn-to-excuses" onclick="showScreen('excuses')"></button>
      <button class="btn-text" onclick="reset()">もう一度チェック</button>
    </div>
  </div>

  <!-- EXCUSES -->
  <div id="screen-excuses" class="screen">
    <p class="excuse-page-title">断る口実</p>
    <p class="excuse-page-note">使いたい文をタップして選んでね</p>
    <p class="excuse-hint">
      ✏️ そのまま使ってもOK。<br>
      自分の言葉に少し変えると、もっと自然に伝わるよ。
    </p>

    <div id="excuse-list"></div>

    <div id="edit-area" class="edit-area" style="display:none">
      <p class="edit-label">✏️ 自分の言葉に変えてみよう</p>
      <p class="edit-hint">名前の呼び方や状況に合わせて、少し変えてから使おう。</p>
      <textarea id="edit-textarea" rows="3"></textarea>
      <button class="btn-copy" id="btn-copy" onclick="copyEdited()">この文をコピーする</button>
    </div>

    <div class="help-box">
      <p class="help-title">🆘 困ったときの連絡先</p>
      <p class="help-item"><strong>よりそいホットライン</strong>　0120-279-338（24時間）</p>
      <p class="help-item"><strong>子どもの人権110番</strong>　0120-007-110</p>
    </div>
    <div style="text-align:center">
      <button class="btn-text" onclick="reset()">最初に戻る</button>
    </div>
  </div>

</div>

<script>
const questions = [
  { text: "会う場所は、駅や公園など\n人目がある場所？", safe: "はい", unsafe: "いいえ／わからない", weight: 2 },
  { text: "今日どこへ行くか、\n家族や友達に伝えてある？", safe: "伝えてある", unsafe: "誰にも言っていない", weight: 2 },
  { text: "断ったら何かされそうな\n不安がある？", safe: "ない", unsafe: "ある／なんとなく怖い", weight: 3 },
  { text: "本当は、行きたくない？", safe: "行きたい", unsafe: "行きたくない／迷ってる", weight: 3 },
  { text: "もし何かあったとき、\nすぐ連絡できる人がいる？", safe: "いる", unsafe: "いない／わからない", weight: 2 },
];

const categories = [
  {
    label: "👨‍👩‍👧 家族・親系",
    items: [
      "お母さんが急に迎えに来ることになった",
      "家族が急に体調悪くなって帰らないといけない",
      "親に「今日は早く帰って」って言われた",
    ]
  },
  {
    label: "🤒 体調系",
    items: [
      "急に体調が悪くなった、ごめんね",
      "頭が痛くて今日は無理かもしれない",
      "生理がひどくて動けない状態になった",
    ]
  },
  {
    label: "👫 友達・学校系",
    items: [
      "友達がすごく困ってて今すぐ行かないといけない",
      "先生から急に呼ばれた",
      "部活の練習が急に入った",
    ]
  },
  {
    label: "✋ シンプルに断る系",
    items: [
      "今日はやっぱり無理になった、また今度にしてほしい",
      "都合が悪くなってしまった、ごめん",
      "今日は行けなくなった、また連絡する",
    ]
  },
];

let current = 0;
let score = 0;
let selectedBtn = null;

function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
}

function startCheck() {
  current = 0;
  score = 0;
  renderQuestion();
  showScreen('check');
}

function renderQuestion() {
  const q = questions[current];
  document.getElementById('q-num').textContent = (current + 1) + ' / ' + questions.length;
  document.getElementById('q-text').textContent = q.text;
  document.getElementById('btn-safe').textContent = q.safe;
  document.getElementById('btn-unsafe').textContent = q.unsafe;
  const prog = document.getElementById('progress');
  prog.innerHTML = '';
  questions.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i <= current ? ' active' : '');
    prog.appendChild(d);
  });
}

function answer(isSafe) {
  if (!isSafe) score += questions[current].weight;
  current++;
  if (current < questions.length) {
    renderQuestion();
  } else {
    showResult();
  }
}

function showResult() {
  let icon, title, text, btnText, color;
  if (score >= 6) {
    icon = '⚠️'; title = '今日は行かないで'; color = '#c0392b';
    text = 'あなたが感じている不安は本物です。\n「断ったら悪い」なんて思わなくていい。\n逃げることは、正しい判断です。';
    btnText = '断る口実を見る';
  } else if (score >= 3) {
    icon = '🔶'; title = '少し心配です'; color = '#e67e22';
    text = '気になることがあるなら、\nまず誰かに今日の予定を伝えて。\n「なんか嫌だ」は大切なサインです。';
    btnText = '断る口実を見る';
  } else {
    icon = '✅'; title = '今のところ大丈夫そう'; color = '#27ae60';
    text = 'でも、もし途中で「やっぱり嫌だ」と\n思ったら、すぐ帰っていい。\nあなたの気持ちが一番大切。';
    btnText = '断る口実も見ておく';
  }
  document.getElementById('result-icon').textContent = icon;
  const t = document.getElementById('result-title');
  t.textContent = title; t.style.color = color;
  document.getElementById('result-text').style.whiteSpace = 'pre-line';
  document.getElementById('result-text').textContent = text;
  document.getElementById('btn-to-excuses').textContent = btnText;
  if (score < 3) document.getElementById('btn-to-excuses').classList.add('gray');
  else document.getElementById('btn-to-excuses').classList.remove('gray');
  showScreen('result');
}

function selectExcuse(text, btn) {
  // 選択解除
  if (selectedBtn) selectedBtn.classList.remove('selected');
  if (selectedBtn === btn) {
    selectedBtn = null;
    document.getElementById('edit-area').style.display = 'none';
    return;
  }
  selectedBtn = btn;
  btn.classList.add('selected');

  // テキストエリアに入れる
  document.getElementById('edit-textarea').value = text;
  document.getElementById('edit-area').style.display = 'block';
  document.getElementById('btn-copy').textContent = 'この文をコピーする';
  document.getElementById('btn-copy').classList.remove('done');

  // スクロール
  setTimeout(() => {
    document.getElementById('edit-area').scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, 100);
}

function copyEdited() {
  const text = document.getElementById('edit-textarea').value;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('btn-copy');
    btn.textContent = '✓ コピーしました';
    btn.classList.add('done');
    setTimeout(() => {
      btn.textContent = 'この文をコピーする';
      btn.classList.remove('done');
    }, 2500);
  });
}

function buildExcuses() {
  const list = document.getElementById('excuse-list');
  list.innerHTML = '';
  let idx = 0;
  categories.forEach(cat => {
    const label = document.createElement('p');
    label.className = 'category-label';
    label.textContent = cat.label;
    list.appendChild(label);

    cat.items.forEach(item => {
      const btn = document.createElement('button');
      btn.className = 'excuse-btn';
      btn.innerHTML = `<span class="excuse-text">「${item}」</span><span class="select-badge">タップして選ぶ</span>`;
      btn.onclick = () => selectExcuse(item, btn);
      list.appendChild(btn);
      idx++;
    });
  });
}

function reset() {
  current = 0; score = 0;
  selectedBtn = null;
  document.getElementById('edit-area').style.display = 'none';
  showScreen('top');
}

buildExcuses();
</script>
</body>
</html>
